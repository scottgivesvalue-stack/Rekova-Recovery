name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Fetch legacy website repo
        run: |
          git clone --depth 1 https://github.com/scottgivesvalue-stack/Rekovarecovery.git legacy-site

      - name: Assemble combined site
        run: |
          rm -rf combined
          mkdir -p combined/app
          rsync -a --exclude '.git' --exclude '.github' legacy-site/ combined/
          rsync -a dist/ combined/app/
          cp public/CNAME combined/CNAME

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./combined
          publish_branch: gh-pages
