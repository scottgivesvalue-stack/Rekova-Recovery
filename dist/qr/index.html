<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rekova QR — /appguide</title>
  <style>
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#0b0b0b;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{background:#0f0f0f;padding:28px;border-radius:12px;border:1px solid rgba(255,255,255,0.04);text-align:center}
    img{width:320px;height:320px}
    a{color:#ea0202;display:inline-block;margin-top:12px}
  </style>
</head>
<body>
  <div class="card">
    <h2>QR to open Rekova App Guide</h2>
    <p style="color:#9a9a9a">Scan this QR or download it for printing.</p>
    <img alt="QR" src="https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=https://rekovarecovery.com/appguide" />
    <div>
      <a href="https://api.qrserver.com/v1/create-qr-code/?size=1200x1200&data=https://rekovarecovery.com/appguide" download="rekova-appguide-qr.png">Download high-res QR (1200x1200)</a>
    </div>
  </div>
</body>
</html>
