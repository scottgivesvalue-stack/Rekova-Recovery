<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rekova Recovery Landing</title>
  <meta name="description" content="Rekova Recovery landing page." />
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #f6f9fb 0%, #eef3f6 100%);
      color: #12212b;
    }
    .card {
      width: min(92vw, 560px);
      background: #ffffff;
      border: 1px solid #dbe4ea;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(10, 36, 64, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.7rem;
      line-height: 1.2;
    }
    p {
      margin: 0 0 18px;
      color: #314958;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .primary {
      background: #0f3a52;
      color: #fff;
    }
    .secondary {
      background: #ecf3f7;
      color: #0f3a52;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Rekova Recovery</h1>
    <p>This is your dedicated landing page. Open the live app or go directly to sign in.</p>
    <div class="actions">
      <a class="primary" href="./">Open Live App</a>
      <a class="secondary" href="./">Open App Route</a>
    </div>
  </main>
</body>
</html>
